<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Agent Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #f8fafc;
  margin: 0;
  padding: 40px;
  text-align: center;
}

h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

p {
  font-size: 1.2rem;
  color: #94a3b8;
  margin-bottom: 30px;
}

.btn {
  background: linear-gradient(90deg,#3b82f6,#8b5cf6);
  color: white;
  padding: 14px 28px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
  display: inline-block;
  margin-bottom: 40px;
  transition: 0.3s;
}

.btn:hover {
  opacity: 0.9;
}

#chatbox {
  max-width: 600px;
  margin: 0 auto;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 16px;
}

#messages {
  height: 300px;
  overflow-y: auto;
  text-align: left;
  margin-bottom: 10px;
}

input {
  width: 70%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-right: 8px;
}

button {
  padding: 12px 16px;
  border-radius: 8px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  font-weight: 600;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>
<body>

<h1>AI Agents That Grow Your Business</h1>
<p>Chat with our AI assistant to see what we can build for you!</p>

<!-- Calendly Button -->
<a href="https://calendly.com/YOUR-LINK" class="btn" target="_blank">Book a Free Call</a>

<!-- Chatbox -->
<div id="chatbox">
  <div id="messages"></div>
  <input id="input" placeholder="Ask about AI for your business..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
  const input = document.getElementById("input");
  const messages = document.getElementById("messages");
  const text = input.value.trim();
  if (!text) return;

  messages.innerHTML += "<p><b>You:</b> " + text + "</p>";

  try {
    const res = await fetch("https://ai-agent-website-1.onrender.com/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    messages.innerHTML += "<p><b>AI:</b> " + data.reply + "</p>";
  } catch (err) {
    messages.innerHTML += "<p><b>AI:</b> Sorry, something went wrong.</p>";
  }

  input.value = "";
  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
